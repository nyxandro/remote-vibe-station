name: Deploy Runtime

on:
  workflow_run:
    workflows:
      - Build And Publish Images
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Runtime service image tag to deploy, for example sha-<commit> or v1.2.3"
        required: false
        type: string
      runtime_version:
        description: "Runtime version label written to .env"
        required: false
        type: string

concurrency:
  group: deploy-runtime-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'master'
      ) ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST" || { echo "Missing secret: DEPLOY_HOST" >&2; exit 1; }
          test -n "$DEPLOY_USER" || { echo "Missing secret: DEPLOY_USER" >&2; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "Missing secret: DEPLOY_SSH_KEY" >&2; exit 1; }

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy runtime images
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_RUNTIME_DIR: ${{ secrets.DEPLOY_RUNTIME_DIR || '/opt/remote-vibe-station-runtime' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_RUNTIME_VERSION: ${{ inputs.runtime_version }}
          DEPLOY_COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_IMAGE_TAG" ]; then
            DEPLOY_IMAGE_TAG="sha-${DEPLOY_COMMIT_SHA}"
          fi
          if [ -z "$DEPLOY_RUNTIME_VERSION" ]; then
            DEPLOY_RUNTIME_VERSION="$DEPLOY_IMAGE_TAG"
          fi
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_RUNTIME_DIR='$DEPLOY_RUNTIME_DIR' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' DEPLOY_IMAGE_TAG='$DEPLOY_IMAGE_TAG' DEPLOY_RUNTIME_VERSION='$DEPLOY_RUNTIME_VERSION' DEPLOY_COMMIT_SHA='$DEPLOY_COMMIT_SHA' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_RUNTIME_DIR"

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          cp .env .env.previous
          if grep -q '^RVS_RUNTIME_VERSION=' .env; then
            sed -i "s#^RVS_RUNTIME_VERSION=.*#RVS_RUNTIME_VERSION=${DEPLOY_RUNTIME_VERSION}#" .env
          else
            printf '\nRVS_RUNTIME_VERSION=%s\n' "$DEPLOY_RUNTIME_VERSION" >> .env
          fi
          if grep -q '^RVS_RUNTIME_COMMIT_SHA=' .env; then
            sed -i "s#^RVS_RUNTIME_COMMIT_SHA=.*#RVS_RUNTIME_COMMIT_SHA=${DEPLOY_COMMIT_SHA}#" .env
          else
            printf 'RVS_RUNTIME_COMMIT_SHA=%s\n' "$DEPLOY_COMMIT_SHA" >> .env
          fi
          sed -i "s#^RVS_BACKEND_IMAGE=.*#RVS_BACKEND_IMAGE=ghcr.io/nyxandro/remote-vibe-station-backend:${DEPLOY_IMAGE_TAG}#" .env
          sed -i "s#^RVS_MINIAPP_IMAGE=.*#RVS_MINIAPP_IMAGE=ghcr.io/nyxandro/remote-vibe-station-miniapp:${DEPLOY_IMAGE_TAG}#" .env
          sed -i "s#^RVS_BOT_IMAGE=.*#RVS_BOT_IMAGE=ghcr.io/nyxandro/remote-vibe-station-bot:${DEPLOY_IMAGE_TAG}#" .env
          sed -i "s#^RVS_OPENCODE_IMAGE=.*#RVS_OPENCODE_IMAGE=ghcr.io/nyxandro/remote-vibe-station-opencode:${DEPLOY_IMAGE_TAG}#" .env

          docker compose --env-file .env -f docker-compose.yml -f docker-compose.vless.yml pull
          docker compose --env-file .env -f docker-compose.yml -f docker-compose.vless.yml up -d --remove-orphans

          if [ -x ./runtime-maintenance.sh ]; then
            ./runtime-maintenance.sh
          fi
          EOF
