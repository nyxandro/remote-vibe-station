name: Build And Publish Images

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional extra image tag to publish for all runtime services"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: nyxandro

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./services/backend
            dockerfile: ./services/backend/Dockerfile
          - service: miniapp
            context: ./services/miniapp
            dockerfile: ./services/miniapp/Dockerfile
          - service: bot
            context: ./services/bot
            dockerfile: ./services/bot/Dockerfile
          - service: opencode
            context: ./services/opencode
            dockerfile: ./services/opencode/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/remote-vibe-station-${{ matrix.service }}"
          TAGS="${IMAGE}:sha-${GITHUB_SHA}"
          if [ "${GITHUB_REF_NAME}" = "master" ] || [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ inputs.image_tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
