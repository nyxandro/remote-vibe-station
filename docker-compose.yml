services:
  proxy:
    image: traefik:v2.11
    # Reverse proxy, TLS и маршрутизация
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--certificatesresolvers.le.acme.email=${TLS_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.le.acme.httpChallenge.entryPoint=web"
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./infra/traefik/acme.json:/acme/acme.json
    networks:
      - public
      - internal

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    # Middleware: OpenCode API, Telegram webhook, управление Docker
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_BACKEND_AUTH_TOKEN=${BOT_BACKEND_AUTH_TOKEN:?BOT_BACKEND_AUTH_TOKEN must be set}
      - BACKEND_URL=http://localhost:3000
      - ADMIN_IDS=${ADMIN_IDS}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
      - ALLOW_UNSAFE_LOCAL_AUTH=${ALLOW_UNSAFE_LOCAL_AUTH:-false}
      - PROJECTS_ROOT=${PROJECTS_ROOT}
      - OPENCODE_CONFIG_DIR=/opencode-config
      - OPENCODE_SERVER_URL=${OPENCODE_SERVER_URL}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME}
      - KANBAN_RUNNER_ENABLED=${KANBAN_RUNNER_ENABLED:-false}
      # Ask backend for short-lived GitHub App credentials so git auth stays global across all projects.
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=credential.https://github.com.helper
      - GIT_CONFIG_VALUE_0=!node /usr/local/bin/github-git-credential.js
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECTS_ROOT}:${PROJECTS_ROOT}
      # Keep optional manual SSH/GitHub CLI access available for operators inside the backend container.
      - /root/.ssh:/root/.ssh
      - /root/.config/gh:/root/.config/gh
      # Shared OpenCode state volume (projects/sessions/messages).
      - opencode_data:/opencode-data
      - opencode_config:/opencode-config
      - backend_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=public"
      - "traefik.http.routers.rvs-backend.rule=Host(`${PUBLIC_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/events`))"
      - "traefik.http.routers.rvs-backend.entrypoints=websecure"
      - "traefik.http.routers.rvs-backend.tls=true"
      - "traefik.http.routers.rvs-backend.tls.certresolver=le"
      - "traefik.http.services.rvs-backend.loadbalancer.server.port=3000"
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/projects"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 10s

  bot:
    build:
      context: ./services/bot
      dockerfile: Dockerfile
    # Telegram webhook обработчик
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - BACKEND_URL=http://backend:3000
      - BOT_BACKEND_AUTH_TOKEN=${BOT_BACKEND_AUTH_TOKEN:?BOT_BACKEND_AUTH_TOKEN must be set}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - OPENCODE_PUBLIC_BASE_URL=${OPENCODE_PUBLIC_BASE_URL:?OPENCODE_PUBLIC_BASE_URL must be set}
    volumes:
      - bot_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bot.rule=Host(`${PUBLIC_DOMAIN}`) && Path(`/bot/webhook`)"
      - "traefik.http.routers.bot.entrypoints=websecure"
      - "traefik.http.routers.bot.tls=true"
      - "traefik.http.routers.bot.tls.certresolver=le"
      - "traefik.http.routers.bot-auth.rule=Host(`${OPENCODE_PUBLIC_DOMAIN:?OPENCODE_PUBLIC_DOMAIN must be set}`) && PathPrefix(`/opencode-auth`)"
      - "traefik.http.routers.bot-auth.entrypoints=websecure"
      - "traefik.http.routers.bot-auth.tls=true"
      - "traefik.http.routers.bot-auth.tls.certresolver=le"
      - "traefik.http.routers.bot-auth.middlewares=noindex-headers@file"
      - "traefik.http.services.bot.loadbalancer.server.port=3001"
    networks:
      - internal
      - public

  miniapp:
    build:
      context: ./services/miniapp
      dockerfile: Dockerfile
    # Mini App для управления
    ports:
      - "${MINIAPP_HOST_PORT:-4173}:4173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.miniapp.rule=Host(`${PUBLIC_DOMAIN}`) && PathPrefix(`/miniapp`)"
      - "traefik.http.routers.miniapp.entrypoints=websecure"
      - "traefik.http.routers.miniapp.tls=true"
      - "traefik.http.routers.miniapp.tls.certresolver=le"
      - "traefik.http.services.miniapp.loadbalancer.server.port=4173"
    networks:
      - internal
      - public

  opencode:
    build:
      context: ./services/opencode
      dockerfile: Dockerfile
    # OpenCode server mode
    command: ["opencode", "serve", "--hostname", "0.0.0.0", "--port", "4096"]
    working_dir: ${PROJECTS_ROOT:?PROJECTS_ROOT must be set}
    environment:
      - BACKEND_URL=http://backend:3000
      - BOT_BACKEND_AUTH_TOKEN=${BOT_BACKEND_AUTH_TOKEN:?BOT_BACKEND_AUTH_TOKEN must be set}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME}
      - CLIPROXY_PROVIDER_ID=${CLIPROXY_PROVIDER_ID:-cliproxy}
      - CLIPROXY_PROVIDER_NAME=${CLIPROXY_PROVIDER_NAME:-CLIProxy}
      - CLIPROXY_BASE_URL=${CLIPROXY_BASE_URL:-http://cliproxy:8317/v1}
      - CLIPROXY_API_KEY=${CLIPROXY_API_KEY:?CLIPROXY_API_KEY must be set}
      - CLIPROXY_DEFAULT_MODEL_ID=${CLIPROXY_DEFAULT_MODEL_ID:-}
      - HOST_ROOT_PATH=/hostfs
      # Ask backend for short-lived GitHub App credentials so agent git auth stays global across projects.
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=credential.https://github.com.helper
      - GIT_CONFIG_VALUE_0=!node /usr/local/bin/github-git-credential.js
    volumes:
      # Trust the dev operator container with host docker control.
      - /var/run/docker.sock:/var/run/docker.sock
      # Keep native project paths available inside the container.
      - ${PROJECTS_ROOT}:${PROJECTS_ROOT}
      # Expose full host filesystem for server-level inspection and maintenance.
      - /:/hostfs
      # Reuse host SSH identities for git/ssh operations initiated by the agent.
      - /root/.ssh:/root/.ssh
      # Keep optional manual GitHub CLI state available for operators inside the OpenCode container.
      - /root/.config/gh:/root/.config/gh
      # Persist OpenCode state (projects/sessions/messages) in a named volume.
      - opencode_data:/root/.local/share/opencode
      # Persist global OpenCode config (AGENTS, agents, skills, plugins, opencode.json).
      - opencode_config:/root/.config/opencode
      # Persist shared toolbox installs and caches for all project workspaces.
      - toolbox_data:/toolbox
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=public"
      - "traefik.http.routers.opencode.rule=Host(`${OPENCODE_PUBLIC_DOMAIN:?OPENCODE_PUBLIC_DOMAIN must be set}`)"
      - "traefik.http.routers.opencode.entrypoints=websecure"
      - "traefik.http.routers.opencode.tls=true"
      - "traefik.http.routers.opencode.tls.certresolver=le"
      - "traefik.http.routers.opencode.middlewares=opencode-forward-auth@file,noindex-headers@file"
      - "traefik.http.services.opencode.loadbalancer.server.port=4096"
    networks:
      - internal
      - public
    depends_on:
      cliproxy:
        condition: service_healthy

  cliproxy:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:latest}
    pull_policy: always
    # CLIProxyAPI gateway for OpenCode OpenAI-compatible provider.
    environment:
      - MANAGEMENT_PASSWORD=${CLIPROXY_MANAGEMENT_PASSWORD:?CLIPROXY_MANAGEMENT_PASSWORD must be set}
    volumes:
      - ./infra/cliproxy/config.yaml:/CLIProxyAPI/config.yaml
      - cliproxy_auth:/root/.cli-proxy-api
      - cliproxy_logs:/CLIProxyAPI/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8317/v1/models"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - internal

networks:
  public:
    name: public
    driver: bridge
  internal:
    driver: bridge

volumes:
  opencode_config:
  backend_data:
  opencode_data:
  bot_data:
  toolbox_data:
  cliproxy_auth:
  cliproxy_logs:
