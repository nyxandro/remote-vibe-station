services:
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_BACKEND_AUTH_TOKEN=${BOT_BACKEND_AUTH_TOKEN:-dev-bot-backend-token}
      - BACKEND_URL=http://localhost:3000
      - ADMIN_IDS=${ADMIN_IDS}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
      - ALLOW_UNSAFE_LOCAL_AUTH=${ALLOW_UNSAFE_LOCAL_AUTH:-false}
      - PROJECTS_ROOT=${PROJECTS_ROOT}
      - OPENCODE_CONFIG_DIR=/opencode-config
      - OPENCODE_SERVER_URL=http://opencode:4096
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME}
      - KANBAN_RUNNER_ENABLED=${KANBAN_RUNNER_ENABLED:-true}
      # Ask backend for short-lived GitHub App credentials so git auth stays global across all projects.
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=credential.https://github.com.helper
      - GIT_CONFIG_VALUE_0=!node /usr/local/bin/github-git-credential.js
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECTS_ROOT}:${PROJECTS_ROOT}
      # Keep optional manual SSH/GitHub CLI access available for operators inside the backend container.
      - /root/.ssh:/root/.ssh
      - /root/.config/gh:/root/.config/gh
      # Shared OpenCode state volume (projects/sessions/messages).
      - opencode_data:/opencode-data
      - opencode_config:/opencode-config
      - backend_data:/app/data
    ports:
      - "${BACKEND_HOST_PORT:-3010}:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/projects"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 5s
    depends_on:
      opencode:
        condition: service_healthy

  miniapp:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4173 --strictPort"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=4173
      - VITE_BACKEND_URL=http://backend:3000
    volumes:
      - ./services/miniapp:/app
      - miniapp_node_modules:/app/node_modules
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy

  opencode:
    build:
      context: ./services/opencode
      dockerfile: Dockerfile
    working_dir: ${PROJECTS_ROOT:-/srv/projects}
    environment:
      - BACKEND_URL=http://backend:3000
      - BOT_BACKEND_AUTH_TOKEN=${BOT_BACKEND_AUTH_TOKEN:-dev-bot-backend-token}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME}
      - CLIPROXY_PROVIDER_ID=${CLIPROXY_PROVIDER_ID:-cliproxy}
      - CLIPROXY_PROVIDER_NAME=${CLIPROXY_PROVIDER_NAME:-CLIProxy}
      - CLIPROXY_BASE_URL=${CLIPROXY_BASE_URL:-http://cliproxy:8317/v1}
      - CLIPROXY_API_KEY=${CLIPROXY_API_KEY:-sk-cliproxy-local}
      - CLIPROXY_DEFAULT_MODEL_ID=${CLIPROXY_DEFAULT_MODEL_ID:-}
      - HOST_ROOT_PATH=/hostfs
      # Ask backend for short-lived GitHub App credentials so agent git auth stays global across projects.
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=credential.https://github.com.helper
      - GIT_CONFIG_VALUE_0=!node /usr/local/bin/github-git-credential.js
    volumes:
      # Mirror server-side operator permissions locally for reproducible behavior.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECTS_ROOT}:${PROJECTS_ROOT}
      - /:/hostfs
      - /root/.ssh:/root/.ssh
      - /root/.config/gh:/root/.config/gh
      # Persist OpenCode state (projects/sessions/messages) in a named volume.
      - opencode_data:/root/.local/share/opencode
      # Persist global OpenCode config (AGENTS, agents, skills, plugins, opencode.json).
      - opencode_config:/root/.config/opencode
      # Persist shared toolbox installs and caches for every project session.
      - toolbox_data:/toolbox
    ports:
      - "4096:4096"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4096/doc"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s
    depends_on:
      cliproxy:
        condition: service_healthy

  cliproxy:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:latest}
    pull_policy: always
    environment:
      - MANAGEMENT_PASSWORD=${CLIPROXY_MANAGEMENT_PASSWORD:-dev-management-password}
    volumes:
      - ./infra/cliproxy/config.yaml:/CLIProxyAPI/config.yaml
      - cliproxy_auth:/root/.cli-proxy-api
      - cliproxy_logs:/CLIProxyAPI/logs
    ports:
      - "8317:8317"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8317/v1/models"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 5s

  bot:
    build:
      context: ./services/bot
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - BACKEND_URL=http://backend:3000
      - BOT_BACKEND_AUTH_TOKEN=${BOT_BACKEND_AUTH_TOKEN:-dev-bot-backend-token}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
    volumes:
      # Media delivery reads staged agent files from the shared OpenCode data volume.
      - opencode_data:/opencode-data:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  miniapp_node_modules:
  opencode_config:
  backend_data:
  opencode_data:
  toolbox_data:
  cliproxy_auth:
  cliproxy_logs:
