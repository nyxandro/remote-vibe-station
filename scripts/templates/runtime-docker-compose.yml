x-logging-defaults: &logging_defaults
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  proxy:
    image: traefik:v2.11
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./infra/traefik/acme.json:/acme/acme.json
    networks:
      - public
      - internal
    logging: *logging_defaults
    restart: unless-stopped
  backend:
    image: ${RVS_BACKEND_IMAGE:?RVS_BACKEND_IMAGE must be set}
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_MINIAPP_SHORT_NAME=${TELEGRAM_MINIAPP_SHORT_NAME}
      - ADMIN_IDS=${ADMIN_IDS}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
      - PROJECTS_ROOT=${PROJECTS_ROOT}
      - OPENCODE_CONFIG_DIR=/opencode-config
      - OPENCODE_SERVER_URL=http://opencode:4096
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME}
      - CLIPROXY_MANAGEMENT_URL=http://cliproxy:8317
      - CLIPROXY_MANAGEMENT_PASSWORD=${CLIPROXY_MANAGEMENT_PASSWORD}
      - OPENCODE_SYNC_ON_START=true
      - OPENCODE_WARM_RECENTS_ON_START=false
      - OPENCODE_WARM_RECENTS_LIMIT=50
      - RUNTIME_CONFIG_DIR=/runtime-config
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/runtime-config
      - ${PROJECTS_ROOT}:${PROJECTS_ROOT}
      - opencode_data:/opencode-data
      - opencode_config:/opencode-config
      - backend_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=public"
      - "traefik.http.routers.rvs-backend.rule=Host(`${PUBLIC_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/events`))"
      - "traefik.http.routers.rvs-backend.entrypoints=websecure"
      - "traefik.http.routers.rvs-backend.tls=true"
      - "traefik.http.routers.rvs-backend.tls.certresolver=le"
      - "traefik.http.services.rvs-backend.loadbalancer.server.port=3000"
    networks:
      - internal
      - public
    logging: *logging_defaults
    restart: unless-stopped
  bot:
    image: ${RVS_BOT_IMAGE:?RVS_BOT_IMAGE must be set}
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - BACKEND_URL=http://backend:3000
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - OPENCODE_PUBLIC_BASE_URL=${OPENCODE_PUBLIC_BASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bot.rule=Host(`${PUBLIC_DOMAIN}`) && Path(`/bot/webhook`)"
      - "traefik.http.routers.bot.entrypoints=websecure"
      - "traefik.http.routers.bot.tls=true"
      - "traefik.http.routers.bot.tls.certresolver=le"
      - "traefik.docker.network=public"
      - "traefik.http.routers.bot-auth.rule=Host(`${OPENCODE_PUBLIC_DOMAIN}`) && PathPrefix(`/opencode-auth`)"
      - "traefik.http.routers.bot-auth.entrypoints=websecure"
      - "traefik.http.routers.bot-auth.tls=true"
      - "traefik.http.routers.bot-auth.tls.certresolver=le"
      - "traefik.http.routers.bot-auth.middlewares=noindex-headers@file"
      - "traefik.http.services.bot.loadbalancer.server.port=3001"
    networks:
      - internal
      - public
    logging: *logging_defaults
    restart: unless-stopped
  miniapp:
    image: ${RVS_MINIAPP_IMAGE:?RVS_MINIAPP_IMAGE must be set}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.miniapp.rule=Host(`${PUBLIC_DOMAIN}`) && PathPrefix(`/miniapp`)"
      - "traefik.http.routers.miniapp.entrypoints=websecure"
      - "traefik.http.routers.miniapp.tls=true"
      - "traefik.http.routers.miniapp.tls.certresolver=le"
      - "traefik.http.routers.miniapp.middlewares=miniapp-slash"
      - "traefik.http.middlewares.miniapp-slash.redirectregex.regex=^https?://([^/]+)/miniapp$"
      - "traefik.http.middlewares.miniapp-slash.redirectregex.replacement=https://$$1/miniapp/"
      - "traefik.http.middlewares.miniapp-slash.redirectregex.permanent=true"
      - "traefik.http.services.miniapp.loadbalancer.server.port=4173"
    networks:
      - internal
      - public
    logging: *logging_defaults
    restart: unless-stopped
  cliproxy:
    image: ${RVS_CLIPROXY_IMAGE:?RVS_CLIPROXY_IMAGE must be set}
    pull_policy: always
    environment:
      - MANAGEMENT_PASSWORD=${CLIPROXY_MANAGEMENT_PASSWORD}
    volumes:
      - ./infra/cliproxy/config.yaml:/CLIProxyAPI/config.yaml
      - cliproxy_auth:/root/.cli-proxy-api
      - cliproxy_logs:/CLIProxyAPI/logs
    networks:
      - internal
    logging: *logging_defaults
    restart: unless-stopped
  opencode:
    image: ${RVS_OPENCODE_IMAGE:?RVS_OPENCODE_IMAGE must be set}
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME}
      - CLIPROXY_PROVIDER_ID=${CLIPROXY_PROVIDER_ID}
      - CLIPROXY_PROVIDER_NAME=${CLIPROXY_PROVIDER_NAME}
      - CLIPROXY_BASE_URL=http://cliproxy:8317/v1
      - CLIPROXY_API_KEY=${CLIPROXY_API_KEY}
      - CLIPROXY_DEFAULT_MODEL_ID=${CLIPROXY_DEFAULT_MODEL_ID}
      - CLIPROXY_MODELS_JSON=${CLIPROXY_MODELS_JSON}
    volumes:
      - ${PROJECTS_ROOT}:${PROJECTS_ROOT}
      - opencode_data:/root/.local/share/opencode
      - opencode_config:/root/.config/opencode
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=public"
      - "traefik.http.routers.opencode.rule=Host(`${OPENCODE_PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.opencode.entrypoints=websecure"
      - "traefik.http.routers.opencode.tls=true"
      - "traefik.http.routers.opencode.tls.certresolver=le"
      - "traefik.http.routers.opencode.middlewares=opencode-forward-auth@file,noindex-headers@file"
      - "traefik.http.services.opencode.loadbalancer.server.port=4096"
    networks:
      - internal
      - public
    logging: *logging_defaults
    restart: unless-stopped
networks:
  public:
    name: public
    driver: bridge
  internal:
    driver: bridge
volumes:
  opencode_config:
  backend_data:
  opencode_data:
  cliproxy_auth:
  cliproxy_logs:
